<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>67: THE CHOSEN NUMBER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=Impact&display=swap');

        body {
            font-family: 'Comic Neue', cursive;
            background: #000;
            color: #fff;
            overflow: hidden;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .meme-text {
            font-family: 'Impact', sans-serif;
            text-transform: uppercase;
            -webkit-text-stroke: 2px black;
            text-shadow: 3px 3px 0 #000;
        }

        #game-container {
            position: relative;
            width: 95%;
            max-width: 500px;
            height: 90vh;
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ff00ff);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            border: 8px solid #fff;
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 0 20px #00ffff;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .float-emoji {
            position: absolute;
            font-size: 2rem;
            pointer-events: none;
            z-index: 10;
        }

        .shake-constant {
            animation: shake 0.2s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
        }

        .btn-meme {
            background: #fff;
            color: #000;
            border: 4px solid #000;
            font-size: 1.5rem;
            padding: 10px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-meme:hover {
            transform: scale(1.1) rotate(2deg);
            background: #ffff00;
        }

        .flash-red { background-color: red !important; }
        .flash-green { background-color: lime !important; }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Header -->
        <div class="mb-4">
            <h1 class="meme-text text-5xl text-yellow-400 italic">67 IS LIFE</h1>
            <p class="text-black font-bold bg-white inline-block px-2">LEGENDARY MEME EDITION</p>
        </div>

        <!-- Score -->
        <div class="flex justify-around items-center mb-4">
            <div class="bg-black p-2 rounded">
                <span class="text-xs block">CLOUT</span>
                <span id="score" class="text-3xl font-bold text-green-400">0</span>
            </div>
            <div class="bg-black p-2 rounded">
                <span class="text-xs block">THE NUMBER</span>
                <span class="text-3xl font-bold text-white">67</span>
            </div>
        </div>

        <!-- Game Screens -->
        <div id="screen-start" class="flex-1 flex flex-col justify-center items-center">
            <div class="text-8xl mb-4">😎</div>
            <h2 class="meme-text text-3xl mb-6">DO YOU EVEN 67 BRO?</h2>
            <button onclick="startGame()" class="btn-meme font-bold shadow-[4px_4px_0px_#000]">START THE GRIND</button>
        </div>

        <div id="screen-game" class="hidden flex-1 flex flex-col justify-center items-center">
            <div id="question-box" class="mb-6 p-4 bg-white text-black rounded-lg w-full border-4 border-black shadow-[8px_8px_0px_rgba(0,0,0,1)]">
                <p id="question-text" class="text-3xl font-bold italic leading-tight"></p>
                <p id="sub-text" class="text-xs uppercase mt-2 font-bold text-blue-600">Quick! Math to 67!</p>
            </div>

            <div id="options-grid" class="grid grid-cols-2 gap-4 w-full">
                <!-- Buttons -->
            </div>
        </div>

        <div id="screen-win" class="hidden flex-1 flex flex-col justify-center items-center">
            <div class="text-9xl mb-4">👑</div>
            <h2 class="meme-text text-4xl text-white mb-2">ABSOLUTE UNIT</h2>
            <p class="text-xl mb-4 text-black font-bold bg-white px-4 italic">67 IQ ACHIEVED</p>
            <p class="mb-4">Score: <span id="final-score-val" class="font-bold text-yellow-300"></span></p>
            <button onclick="resetGame()" class="btn-meme shadow-[4px_4px_0px_#000]">GO AGAIN</button>
        </div>

        <!-- Feedback Area -->
        <div id="feedback" class="meme-text h-16 mt-4 flex items-center justify-center text-3xl"></div>
    </div>

    <script>
        let score = 0;
        let currentAnswer = 0;
        const targetNumber = 67;
        const totalRounds = 15; // Increased rounds
        let currentRound = 0;

        const MEME_PHRASES = ["SHEEEESH", "NO CAP", "BIG BRAIN", "W", "GIGACHAD", "POGGERS", "WOT", "CLEAN", "GOATED"];
        const FAIL_PHRASES = ["BRUH", "L", "SKILL ISSUE", "SADGE", "RIPAroni", "COULDN'T BE ME", "U WOT M8"];

        function startGame() {
            score = 0;
            currentRound = 0;
            document.getElementById('score').innerText = score;
            showScreen('screen-game');
            nextQuestion();
            spawnRandomEmojis();
        }

        function resetGame() {
            showScreen('screen-start');
        }

        function showScreen(screenId) {
            ['screen-start', 'screen-game', 'screen-win'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(screenId).classList.remove('hidden');
        }

        function spawnRandomEmojis() {
            const container = document.getElementById('game-container');
            const emojis = ['🔥', '💯', '💀', '😂', '🥶', '🤡', '🤑', '👽', '🍔'];
            
            setInterval(() => {
                if (document.getElementById('screen-game').classList.contains('hidden')) return;
                const emoji = document.createElement('div');
                emoji.className = 'float-emoji';
                emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                emoji.style.left = Math.random() * 80 + 10 + '%';
                emoji.style.top = '100%';
                container.appendChild(emoji);

                let pos = 100;
                const int = setInterval(() => {
                    pos -= 2;
                    emoji.style.top = pos + '%';
                    if (pos < -10) {
                        clearInterval(int);
                        emoji.remove();
                    }
                }, 30);
            }, 1200);
        }

        function nextQuestion() {
            if (currentRound >= totalRounds) {
                document.getElementById('final-score-val').innerText = score;
                showScreen('screen-win');
                return;
            }

            const feedback = document.getElementById('feedback');
            feedback.innerText = '';
            
            const type = Math.floor(Math.random() * 6); // More question types
            let qText = "";
            let subText = "Quick! Math to 67!";

            switch(type) {
                case 0: // Addition
                    const add1 = Math.floor(Math.random() * 60) + 1;
                    currentAnswer = targetNumber - add1;
                    qText = `${add1} + ? = 67`;
                    break;
                case 1: // Subtraction
                    const subStart = Math.floor(Math.random() * 50) + 70;
                    currentAnswer = subStart - targetNumber;
                    qText = `${subStart} - ? = 67`;
                    break;
                case 2: // Double Trouble
                    const part1 = Math.floor(Math.random() * 30);
                    const part2 = Math.floor(Math.random() * 20);
                    currentAnswer = targetNumber - (part1 + part2);
                    qText = `${part1} + ${part2} + ? = 67`;
                    break;
                case 3: // Multiplication-ish
                    const mult = 2;
                    const base = 30;
                    currentAnswer = targetNumber - (mult * base); // 7
                    qText = `(2 x 30) + ? = 67`;
                    break;
                case 4: // Meme Logic
                    const memes = [
                        { q: "60 + 9 - 2 = ?", a: 67 },
                        { q: "Is 67 the GOAT?", a: "YES" },
                        { q: "Half of 134?", a: 67 },
                        { q: "What's 70 - 3?", a: 67 }
                    ];
                    const selected = memes[Math.floor(Math.random() * memes.length)];
                    qText = selected.q;
                    currentAnswer = selected.a;
                    subText = "MEME SPEEDROUND";
                    break;
                case 5: // The "Missing 7"
                    currentAnswer = 7;
                    qText = `60 + ? = 67`;
                    subText = "EASY CLAP";
                    break;
            }

            document.getElementById('question-text').innerText = qText;
            document.getElementById('sub-text').innerText = subText;
            
            let options = [currentAnswer];
            
            // Handle Non-numeric answers (like "YES")
            if (typeof currentAnswer === 'string') {
                options = ["YES", "NO", "MAYBE", "BRUH"];
            } else {
                while (options.length < 4) {
                    let wrong = currentAnswer + (Math.floor(Math.random() * 20) - 10);
                    if (wrong !== currentAnswer && !options.includes(wrong) && wrong >= 0) {
                        options.push(wrong);
                    }
                }
            }
            
            options.sort(() => Math.random() - 0.5);

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'btn-meme shadow-[4px_4px_0px_#000]';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                grid.appendChild(btn);
            });
        }

        function checkAnswer(selected, btn) {
            const feedback = document.getElementById('feedback');
            const container = document.getElementById('game-container');

            if (selected === currentAnswer) {
                score += 100;
                document.getElementById('score').innerText = score;
                feedback.innerText = MEME_PHRASES[Math.floor(Math.random() * MEME_PHRASES.length)];
                feedback.style.color = "#00ff00";
                btn.classList.add('flash-green');
                currentRound++;
                
                // Extra clout for fast answers
                const bonus = Math.random() > 0.8;
                if(bonus) {
                    feedback.innerText += " + BONUS!";
                    score += 50;
                }

                setTimeout(nextQuestion, 600);
            } else {
                feedback.innerText = FAIL_PHRASES[Math.floor(Math.random() * FAIL_PHRASES.length)];
                feedback.style.color = "#ff0000";
                btn.classList.add('flash-red');
                container.classList.add('shake-constant');
                setTimeout(() => {
                    container.classList.remove('shake-constant');
                    btn.classList.remove('flash-red');
                }, 500);
            }
        }
    </script>
</body>
</html>
